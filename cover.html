<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 900px; height: 500px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .bg-img { position: absolute; inset: 0; z-index: -2; object-fit: cover; width: 100%; height: 100%; }
  .overlay { position: absolute; inset: 0; z-index: -1; background: rgba(0,0,0,0.4); }
  .content { padding: 40px 60px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
  .brand { font-size: 18px; color: rgba(255,255,255,0.85); letter-spacing: 6px; font-weight: 600; }
  .date { font-size: 14px; color: rgba(255,255,255,0.55); }
  .tail { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 10px; }
</style>
</head>
<body>
  <img class="bg-img" src="cover.png" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="brand">知 著 证 孤</div>
    <div class="date">⸻  2026-05-22  ⸻</div>
    <div class="tail">AI 科技速递 · 每日精选</div>
  </div>
</body>
</html>
