<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 900px; height: 500px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .bg { position: absolute; inset: 0; z-index: -1; }
  .content { padding: 40px 60px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
  .brand { font-size: 16px; color: rgba(255,255,255,0.7); letter-spacing: 4px; text-transform: uppercase; }
  .date { font-size: 14px; color: rgba(255,255,255,0.5); }
  .tail { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 10px; }
</style>
</head>
<body>
  <svg class="bg" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#1a1a2e"/>
        <stop offset="100%" style="stop-color:#2d3a5e"/>
      </linearGradient>
    </defs>
    <rect width="900" height="500" fill="url(#g)"/>
    <circle cx="750" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
    <circle cx="100" cy="400" r="150" fill="rgba(255,255,255,0.04)"/>
  </svg>
  <div class="content">
    <div class="brand">知 著 证 孤</div>
    <div class="date">⸻  2026-05-15  ⸻</div>
    <div class="tail">AI 科技速递 · 每日精选</div>
  </div>
</body>
</html>
